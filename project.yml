name: LootList

options:
  bundleIdPrefix: com.volcrypt.lootlist
  deploymentTarget:
    iOS: "26.0"
  createIntermediateDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: "LYYD96F2J8"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
  LootList:
    type: application
    platform: iOS
    sources:
      - path: Project
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Project/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.volcrypt.lootlist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LootList.entitlements
        CODE_SIGN_IDENTITY: "iPhone Developer"
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        VERSIONING_SYSTEM: "apple-generic"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Loot List
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: armv7
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES 
        PRODUCT_NAME: LootList
      configs:
        Debug:
          ICLOUD_CONTAINER_ENVIRONMENT: Development
        Release:
          ICLOUD_CONTAINER_ENVIRONMENT: Production
        
    entitlements:
      path: LootList.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.volcrypt.lootlist
        com.apple.developer.icloud-services:
          - CloudKit

  LootListTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ProjectTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LootList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.volcrypt.lootlist.tests
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES

  LootListUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ProjectUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LootList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.volcrypt.lootlist.uitests
        TEST_TARGET_NAME: LootList
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LootList:
    build:
      targets:
        LootList: all
        LootListTests: [test]
        LootListUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LootListTests
        - LootListUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

