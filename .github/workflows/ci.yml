name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macOS-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app || true
      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-
      - name: Build
        run: xcodebuild -project LootList.xcodeproj -scheme LootList -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=26.2' build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=-

  unit-tests:
    runs-on: macOS-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app || true
      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-
      - name: Unit Tests
        run: xcodebuild -project LootList.xcodeproj -scheme LootList -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=26.2' test -only-testing:LootListTests -skip-testing:LootListTests/CloudKitModelTests CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=- -resultBundlePath ./unit-test-results.xcresult
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./unit-test-results.xcresult

  ui-tests:
    runs-on: macOS-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app || true
      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-
      - name: UI Tests
        run: xcodebuild -project LootList.xcodeproj -scheme LootList -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=26.2' test -only-testing:LootListUITests -skip-testing:LootListUITests/LootListScreenshotTests CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=- -resultBundlePath ./ui-test-results.xcresult
      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ./ui-test-results.xcresult

  lint:
    runs-on: macOS-26
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat lint
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint