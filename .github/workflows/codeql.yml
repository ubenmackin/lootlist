name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 4 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: ruby
          build-mode: none
        - language: swift
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Select Xcode before initializing or building Swift
    - name: Select Xcode
      if: matrix.language == 'swift'
      run: sudo xcode-select -s /Applications/Xcode_26.3.app || true

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # Replaces default placeholder with your specific xcodebuild command
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      run: |
        xcodebuild -project LootList.xcodeproj \
          -scheme LootList \
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=26.2' \
          build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY=-

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
