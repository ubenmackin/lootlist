name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 4 * * 4'

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macOS-26
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode 26.3
      run: sudo xcode-select -s /Applications/Xcode_26.3.app || true

    - uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.swift') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-

    # Initializes CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: swift
        build-mode: manual

    # Build step using generic destination (avoids simulator daemon hangs)
    - name: Build Swift Code
      run: |
        xcodebuild -project LootList.xcodeproj \
          -scheme LootList \
          -destination 'generic/platform=iOS' \
          build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY=-

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:swift"
